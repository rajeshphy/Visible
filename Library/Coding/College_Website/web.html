<!DOCTYPE html>
<html>
<head>
    <title>College Website</title>
    <link rel="stylesheet" type="text/css" href="web.css">
    <style>
        body {
            background-color: #f1f1f1; /* Add background color */
            font-family: Times, serif;
            font-size: 16pt;
            margin: 20px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-top: 50px;
        }
        
        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
            width: 100%;
        }
        
        .button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 18px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .button:hover {
            background-color: #0056b3;
        }
        
        /* Mobile Styles */
        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
                margin-top: 20px;
            }
            
            .container {
                flex-direction: column;
                align-items: center;
                margin-top: 20px;
            }
            
            .button {
                margin: 10px 0;
            }
        }
        
        /* Premium Styles */
        .premium {
            background-color: #ffcc00;
            color: #333;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        
        .premium:hover {
            background-color: #e6b800;
        }
        
        /* Adjusted Banner Height */
        img {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-height: 200px;
        }

        .box {
            background-color: #ffffff; /* Add box background color */
            margin: 20px; /* Add margin to the box */
            padding: 20px; /* Add padding to the box */
            border-radius: 10px; /* Add border radius to the box */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Add box shadow to the box */
        }

        #slideshow {
            width: 60%;
            height: 40%; /* Updated height to be half of the width */
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>College Name</h1>
        <div class="container">
        </div>  
        <img id="banner" src="banner.png" alt="College Banner">
        <div class="container">
            <button class="button premium">About</button>
            <button class="button premium">Directions</button>
            <button class="button premium">Teachings</button>
        </div>

        
        <p id="content">
            <!-- Content from body.txt will be displayed here -->
        </p>
        
        <img id="slideshow" src="" alt="College Banner">

    </div>  

    <footer style="text-align: center;">Design by <a href="https://rajeshphy.github.io">Rajesh Kumar</a></footer>
      
    <script src="web.js"></script>
    <script> 
    //Slideshow
    var images = [];
    var imageElements = document.querySelectorAll("#slideshow IMG");
    for (var i = 0; i < imageElements.length; i++) {
        images.push(imageElements[i].src);
    }
    var currentIndex = 0;
    var slideshow = document.getElementById("slideshow");

    // Function to change the image source
    function changeImage() {
        slideshow.src = images[currentIndex];
        currentIndex++;
        if (currentIndex >= images.length) {
            currentIndex = 0;
        }
    }

    // Call the changeImage function every 3 seconds
    setInterval(changeImage, 3000);
    </script>
</body>
</html>
